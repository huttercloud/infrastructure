---
- name: Ensure ollama data directory exists
  ansible.builtin.file:
    path: "{{ ollama_compose_bind_dir_data }}"
    state: directory
    mode: "0755"

- name: Ensure ollama compose directory exists
  ansible.builtin.file:
    path: "{{ ollama_compose_dir }}"
    state: directory
    mode: "0755"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ollama_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  vars:
    network: "{{ traefik_network_name }}"
    compose_file_reference: "{{ ollama_compose_dir }}/docker-compose.yml"
    image: "{{ ollama_image }}"
    bind_dir_data: "{{ ollama_compose_bind_dir_data }}"

- name: Start ollama container
  community.docker.docker_compose_v2:
    project_src: "{{ ollama_compose_dir }}"

- name: Pull ollama models
  ansible.builtin.command:
    cmd: "docker exec ollama ollama pull {{ item }}"
  loop: "{{ ollama_models }}"
  changed_when: true

- name: Prepare update cronjob
  ansible.builtin.template:
    src: ollama-update.sh.j2
    dest: /usr/local/bin/ollama-update.sh
    mode: "0750"

- name: Ensure ollama update cronjob is set
  ansible.builtin.cron:
    name: "ollama update"
    weekday: "*"
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/ollama-update.sh > /tmp/ollama-update.log 2>&1"
    user: root
    cron_file: ollama-update
