---
- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes

- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"
    force: yes

- name: Add Tailscale repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main"
    state: present
    filename: tailscale
    update_cache: yes

- name: Install Tailscale
  ansible.builtin.apt:
    name:
      - tailscale
    state: present

- name: Ensure tailscaled service is running and enabled
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Authenticate Tailscale
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_auth_key }} {{ tailscale_args }}"
  changed_when: true
  when: tailscale_auth_key | length > 0
