---
- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes

- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

# Install NVIDIA GPU drivers from Ubuntu's official repository
- name: Install NVIDIA driver packages
  ansible.builtin.apt:
    name:
      - nvidia-driver-{{ nvidia_driver_version }}
      - nvidia-utils-{{ nvidia_driver_version }}
    state: present
  register: nvidia_driver_install

- name: Reboot if NVIDIA drivers were just installed
  ansible.builtin.reboot:
    msg: "Rebooting to load NVIDIA kernel modules"
    reboot_timeout: 300
  when: nvidia_driver_install.changed

- name: Verify NVIDIA driver is loaded
  ansible.builtin.command:
    cmd: nvidia-smi
  changed_when: false

# Install NVIDIA container toolkit
- name: Create keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NVIDIA container toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: "0644"
    force: yes

- name: Add NVIDIA container toolkit repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.asc] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /"
    state: present
    filename: nvidia-container-toolkit
    update_cache: yes

- name: Install nvidia-container-toolkit
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
    state: present

- name: Configure Docker to use NVIDIA runtime
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker
  changed_when: true
  notify: restart docker
